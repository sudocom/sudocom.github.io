<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SSGrowth Institutional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .panel { background: #0d0d0d; border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-field { background: #141414; border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s; }
        .input-field:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 1px #2563eb; }
    </style>
</head>
<body class="flex items-center justify-center min-height-screen h-screen">
    <div class="w-full max-w-sm p-8 animate-in fade-in duration-500">
        <div class="flex flex-col items-center mb-10">
            <div class="w-1 h-8 bg-blue-600 mb-4"></div>
            <h2 class="text-xl font-bold tracking-tighter uppercase">SSGrowth Terminal</h2>
            <p class="text-xs text-gray-500 mt-2">Authorized Personnel Only</p>
        </div>
        
        <form class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 block">Work Email</label>
                <input type="email" class="input-field w-full p-3 rounded text-sm text-white" placeholder="name@firm.com" required>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 block">Password</label>
                <input type="password" class="input-field w-full p-3 rounded text-sm text-white" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded text-sm transition-all mt-2">Authenticate</button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <p class="text-xs text-gray-500">New to the platform? <a href="/signup" class="text-blue-500 hover:text-blue-400 font-medium">Request Access</a></p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
