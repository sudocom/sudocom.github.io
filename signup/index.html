<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SSGrowth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .input-box { background: #111; border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.2s; }
        .input-box:focus { border-color: #3b82f6; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="w-full max-w-md p-10 bg-[#0d0d0d] border border-white/5 rounded-2xl shadow-2xl">
        <div class="mb-8">
            <h2 class="text-2xl font-bold tracking-tight">Register for SSGrowth</h2>
            <p class="text-xs text-gray-500 mt-2">Create your professional profile to start tracking.</p>
        </div>
        
        <form class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1 tracking-widest">First Name</label>
                    <input type="text" class="input-box w-full p-3 rounded-lg text-sm text-white" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1 tracking-widest">Last Name</label>
                    <input type="text" class="input-box w-full p-3 rounded-lg text-sm text-white" required>
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1 tracking-widest">Email Address</label>
                <input type="email" class="input-box w-full p-3 rounded-lg text-sm text-white" required>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1 tracking-widest">Password</label>
                <input type="password" class="input-box w-full p-3 rounded-lg text-sm text-white" required>
            </div>
            <button type="submit" class="w-full bg-white text-black font-bold py-3 rounded-lg text-sm hover:bg-gray-200 transition-all">Create Account</button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-gray-500">Already a member? <a href="/login/" class="text-blue-500 hover:underline">Log in</a></p>
            <a href="/" class="text-[10px] text-gray-600 block mt-4 hover:text-white transition-colors">← Back to Terminal</a>
        </div>
    </div>
</body>
</html>
