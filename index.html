<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal | SSGrowth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ededed; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .grid-master { display: grid; grid-template-columns: 260px 1fr 300px; grid-template-rows: 60px 1fr; height: 100vh; }
        .panel-border { border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div class="grid-master">
        <header class="col-span-3 panel-border flex items-center justify-between px-6 bg-[#0a0a0a] z-50">
            <div class="flex items-center gap-10">
                <span class="font-bold text-lg tracking-tighter">SSGROWTH</span>
                <nav class="flex gap-6 text-xs font-medium text-gray-500">
                    <a href="/" class="text-white">Terminal</a>
                    <a href="#" class="hover:text-white transition-colors">Documentation</a>
                </nav>
            </div>
            <div class="flex gap-4 items-center">
                <a href="/login/" class="text-xs font-bold text-gray-400 hover:text-white">Log in</a>
                <a href="/signup/" class="bg-white text-black text-xs font-bold px-4 py-2 rounded hover:bg-gray-200 transition-all">Open Account</a>
            </div>
        </header>

        <aside class="panel-border border-t-0 p-6 bg-[#080808]">
            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-6">Library</h3>
            <ul class="space-y-4 text-sm text-gray-400">
                <li class="flex items-center gap-3 text-blue-500"><i data-lucide="book" class="w-4 h-4"></i> Getting Started</li>
                <li class="flex items-center gap-3 hover:text-white cursor-pointer"><i data-lucide="code" class="w-4 h-4"></i> API Keys</li>
            </ul>
        </aside>

        <main class="p-8 overflow-y-auto">
            <h1 class="text-2xl font-light mb-8">Institutional Overview</h1>
            <div class="bg-[#0d0d0d] p-8 rounded-xl border border-white/5">
                <div class="text-[10px] text-gray-500 uppercase mb-2">Growth Index (GIX)</div>
                <div class="text-5xl mono tracking-tighter">14,209.55 <span class="text-xl text-emerald-500 font-normal">+1.8%</span></div>
                <div class="mt-8 h-32 w-full bg-blue-600/5 rounded border-b-2 border-blue-600/40"></div>
            </div>
        </main>

        <aside class="panel-border border-t-0 p-6 bg-[#080808]">
            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-6">Watchlist</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center"><span class="text-sm">NVDA</span><span class="mono text-sm text-emerald-500">822.40</span></div>
            </div>
        </aside>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
