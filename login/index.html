<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SSGrowth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .input-box { background: #111; border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.2s; }
        .input-box:focus { border-color: #3b82f6; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="w-full max-w-sm p-8 bg-[#0d0d0d] border border-white/5 rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-xl font-bold tracking-tight">Login to SSGrowth</h2>
            <p class="text-xs text-gray-500 mt-2">Access your institutional terminal</p>
        </div>
        
        <form class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1 tracking-widest">Work Email</label>
                <input type="email" class="input-box w-full p-3 rounded-lg text-sm text-white" placeholder="name@firm.com" required>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1 tracking-widest">Password</label>
                <input type="password" class="input-box w-full p-3 rounded-lg text-sm text-white" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-sm transition-all">Authenticate</button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-500">Don't have an account? <a href="/signup/" class="text-blue-500 hover:underline">Request Access</a></p>
            <a href="/" class="text-[10px] text-gray-600 block mt-4 hover:text-white transition-colors">← Back to Terminal</a>
        </div>
    </div>
</body>
</html>
