<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SSGrowth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .input-box { background: #111; border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.2s; color: white; }
        .input-box:focus { border-color: #3b82f6; outline: none; }
        #toast { transform: translateY(100px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #toast.show { transform: translateY(0); }
    </style>
</head>
<body class="flex items-center justify-center h-screen relative overflow-hidden">
    
    <div id="toast" class="fixed bottom-10 bg-blue-600 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-4 z-[100]">
        <div id="toast-icon">ℹ️</div>
        <div id="toast-message" class="text-sm font-medium"></div>
    </div>

    <div class="w-full max-w-sm p-8 bg-[#0d0d0d] border border-white/5 rounded-2xl">
        <div class="text-center mb-8">
            <h2 class="text-xl font-bold tracking-tight">Login to SSGrowth</h2>
            <p class="text-xs text-gray-500 mt-2">Access institutional terminal</p>
        </div>
        
        <form id="login-form" class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Work Email</label>
                <input type="email" id="email" class="input-box w-full p-3 rounded-lg text-sm" placeholder="name@firm.com" required>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Password</label>
                <input type="password" id="password" class="input-box w-full p-3 rounded-lg text-sm" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-sm transition-all">Authenticate</button>
        </form>

        <div class="mt-6 text-center text-xs text-gray-500">
            New user? <a href="/signup/" class="text-blue-500 hover:underline">Create Account</a>
        </div>
    </div>

   <script>
    const SB_URL = "https://vzywmrrusdsanjczohej.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6eXdtcnJ1c2RzYW5qY3pvaGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDk1ODgsImV4cCI6MjA4NzkyNTU4OH0.JBHuJXWv_0sOrbmWbp5Nh4ryaNOeVODbW62nPuvgnaE";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    // TOAST LOGIC
    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 6000);
    }

    // CHECK URL FOR VERIFY PARAMETER IMMEDIATELY
    window.onload = () => {
        if (window.location.search.includes('verify=true')) {
            showToast("Success! Please check your inbox for a confirmation email.");
        }
    };

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const { error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            showToast("Authentication Failed: " + error.message);
        } else {
            window.location.replace(window.location.origin + "/index.html");
        }
    });
</script>
</body>
</html>
